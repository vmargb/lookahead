<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <h2>Lookahead Settings</h2>
  </div>
  
  <div class="option-group">
    <label for="search-engine">Search Engine</label>
    <select id="search-engine">
      <option value="google">Google</option>
      <option value="startpage">Startpage</option>
      <option value="duckduckgo">DuckDuckGo</option>
    </select>
  </div>

  <div class="option-group">
    <label>Keyword Mode</label>
    <div class="toggle-container">
      <span>Off</span>
      <label class="toggle-switch">
        <input type="checkbox" id="use-omnibox-keyword" />
        <span class="slider"></span>
      </label>
      <span>On</span>
    </div>
    <div class="description">Type 'la' prefix for searches</div>
  </div>
  
  <div class="option-group">
    <label>Behaviour Mode</label>
    <div class="toggle-container">
      <span>Instant</span>
      <label class="toggle-switch">
        <input type="checkbox" id="preview-mode">
        <span class="slider"></span>
      </label>
      <span>Preview</span>
    </div>
    <div class="description">Instantly open the best result or show a preview</div>
    
    <div class="number-input-container" id="preview-count-container">
      <label for="preview-count">Results to preview</label>
      <input type="number" id="preview-count" min="2" max="8" value="4">
    </div>
  </div>
  
  <div class="shortcuts">
    <h3>Keyboard Shortcuts</h3>
    <div class="shortcut-item">
      <span>Next Result</span>
      <span class="key-combo">Shift+Alt+L</span>
    </div>
    <div class="shortcut-item">
      <span>Previous Result</span>
      <span class="key-combo">Shift+Alt+O</span>
    </div>
    <div class="shortcut-item">
      <span>Floating Results</span>
      <span class="key-combo">Shift+Alt+P</span>
    </div>
  </div>

  <div class="support-section">
    <img src="./icons/ko-fi.png" alt="Ko-fi" class="support-icon">
    <a href="https://ko-fi.com/vmargb" target="_blank" class="support-link">Buy me a coffee</a>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
